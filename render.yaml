# Render blueprint for the AURA backend and its database.
#
# Render rather than Vercel because the backend needs a long-lived process:
# uploaded reports are written to disk, parsing takes ten to twenty seconds, and
# the database holds state between requests. Vercel's Python runtime is
# serverless and provides none of those.

databases:
  - name: aura-db
    databaseName: aura
    user: aura
    plan: free

services:
  - type: web
    name: aura-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aura-db
          property: connectionString

      # Turns off dev auth, and makes missing Firebase credentials a hard
      # startup failure rather than a silent downgrade to unverified identities.
      - key: ENV
        value: production

      - key: ALLOW_DEV_AUTH
        value: "false"

      # Set in the Render dashboard, never committed.
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        sync: false

      # The deployed frontend's origin. Without it the browser blocks every
      # request from the Vercel domain.
      - key: CORS_ORIGINS
        sync: false

      # Uploaded reports. Render's free tier has an ephemeral filesystem, so
      # these are lost on restart -- fine for a demo, and the reason
      # services/storage.py keeps its interface swappable for object storage.
      - key: UPLOAD_DIR
        value: /tmp/uploads
